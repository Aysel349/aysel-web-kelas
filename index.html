<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMG Trans</title>
  <!-- Font & Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b2a3b 0%, #1a4b5f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      max-width: 820px;
      width: 100%;
      background: #f2f6fa;
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 8px 16px rgba(0, 20, 30, 0.5);
      overflow: hidden;
      transition: 0.25s ease;
      backdrop-filter: blur(2px);
    }

    /* header bus — gambar dari file yang diberikan */
    .bus-header {
      background: #1f3e4b;
      padding: 20px 24px 12px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 4px solid #f4b942;
    }

    .bus-art {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px 20px;
      width: 100%;
    }

    .bus-silhouette {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #2b5365;
      padding: 10px 22px 10px 18px;
      border-radius: 100px 100px 30px 30px;
      box-shadow: inset 0 -6px 0 #16313d, 0 8px 0 #0f262f;
    }

    .bus-body {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bus-icon {
      font-size: 2.8rem;
      color: #fadf9e;
      filter: drop-shadow(2px 6px 4px rgba(0,0,0,0.4));
    }

    .bus-wheels {
      display: flex;
      gap: 16px;
      margin-left: 8px;
    }

    .wheel {
      width: 28px;
      height: 28px;
      background: #1f1f1f;
      border-radius: 50%;
      border: 4px solid #3d3d3d;
      box-shadow: inset 0 -3px 0 #0a0a0a, 0 4px 0 #111;
    }

    .bus-stripe {
      display: flex;
      gap: 6px;
    }

    .stripe {
      width: 18px;
      height: 6px;
      background: #f4b942;
      border-radius: 20px;
      opacity: 0.8;
    }

    .bus-route {
      background: #2f5f72;
      padding: 6px 20px;
      border-radius: 40px;
      color: #fff3d6;
      font-weight: 600;
      letter-spacing: 1.5px;
      font-size: 0.9rem;
      box-shadow: inset 0 -2px 0 #12303b;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .route-number {
      background: #f4b942;
      color: #1a2f38;
      padding: 0 12px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    /* teks TRANS / TRAN dari gambar */
    .trans-badge {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0 14px;
      background: #1b3d4b;
      padding: 8px 24px;
      border-radius: 60px;
      margin-top: 8px;
      color: #b7dbe9;
      font-weight: 500;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-shadow: 0 2px 0 #0c2833;
    }

    .trans-badge span {
      background: #254f5e;
      padding: 0 6px;
      border-radius: 12px;
      color: #e3f0f5;
    }

    /* isi tiket */
    .ticket-body {
      padding: 28px 28px 32px;
      background: #ffffff;
    }

    .ticket-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 2px dashed #cbd8e3;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    .ticket-title h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0b2e3b;
      letter-spacing: 1px;
    }

    .ticket-title h2 i {
      color: #e09d32;
      margin-right: 10px;
    }

    .ticket-title .sub {
      color: #4d6f7e;
      font-weight: 500;
      background: #eaf0f5;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
    }

    .grid-tiket {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px 30px;
      margin-bottom: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5f7e8f;
      font-weight: 600;
    }

    .field .value {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0b2a36;
      background: #f0f5fa;
      padding: 6px 14px;
      border-radius: 40px;
      display: inline-block;
      border: 1px solid #dbe6ef;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
    }

    .field .value i {
      margin-right: 8px;
      color: #d68f2c;
      width: 1.2rem;
    }

    .highlight-badge {
      background: #fcf3e0;
      border-radius: 40px;
      padding: 6px 18px;
      border-left: 4px solid #f4b942;
    }

    /* elemen dari file j993.jpg dan 27trans.png */
    .non-ekonomi {
      background: #142f3b;
      color: #f7d99e;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 2px;
      display: inline-block;
      box-shadow: inset 0 -3px 0 #0a2029;
    }

    .juragan-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 20px;
      margin: 16px 0 12px;
      background: #ebf3f8;
      padding: 12px 20px;
      border-radius: 60px;
    }

    .juragan-strip span {
      font-weight: 700;
      color: #1e4657;
    }

    .juragan-strip .jrg {
      background: #1d3e4b;
      color: #f5d68b;
      padding: 2px 18px;
      border-radius: 40px;
      font-size: 1.3rem;
      letter-spacing: 2px;
    }

    .thor-frehr {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px 28px;
      background: #e3eef5;
      padding: 10px 24px;
      border-radius: 60px;
      margin-top: 10px;
    }

    .thor-frehr .code {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 1.2rem;
      color: #193946;
    }

    .thor-frehr .xxvii {
      background: #1b3f4e;
      color: #f2dba5;
      padding: 2px 18px;
      border-radius: 40px;
      font-weight: 700;
    }

    /* aksen xstrans */
    .extra-trans {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 2px dashed #cbd8e3;
      color: #2c5d70;
    }

    .extra-trans .trans-line {
      display: flex;
      gap: 8px;
      font-weight: 600;
      color: #1b4557;
    }

    .btn-book {
      background: #f4b942;
      border: none;
      padding: 14px 36px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #0f2c38;
      box-shadow: 0 8px 0 #b87d2a, 0 6px 16px rgba(0,0,0,0.2);
      transition: 0.08s linear;
      cursor: pointer;
      width: 100%;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      letter-spacing: 1px;
    }

    .btn-book:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #b87d2a;
    }

    .btn-book i {
      font-size: 1.4rem;
    }

    /* responsif */
    @media (max-width: 640px) {
      .grid-tiket {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .bus-art {
        flex-direction: column;
        align-items: flex-start;
      }
      .bus-silhouette {
        width: 100%;
        justify-content: center;
      }
      .trans-badge {
        font-size: 0.9rem;
        gap: 0 8px;
      }
      .ticket-title {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- BUS HEADER — gambar dari ut2.jpg (TRANS) + tema bus -->
    <div class="bus-header">
      <div class="bus-art">
        <div class="bus-silhouette">
          <div class="bus-body">
            <i class="fas fa-bus bus-icon"></i>
            <div class="bus-stripe">
              <span class="stripe"></span>
              <span class="stripe"></span>
              <span class="stripe"></span>
            </div>
          </div>
          <div class="bus-wheels">
            <div class="wheel"></div>
            <div class="wheel"></div>
          </div>
        </div>
        <div class="bus-route">
          <span>RUTE</span>
          <span class="route-number">J 99</span>
          <i class="fas fa-arrow-right" style="color: #f4b942;"></i>
          <span>NUSANTARA</span>
        </div>
      </div>
      <!-- TRANS / TRAN dari ut2.jpg -->
      <div class="trans-badge">
        <span>TRANS</span>
        <span>TRANS</span>
        <span>TRANS</span>
        <span>TRANS</span>
        <span>TRANS</span>
        <span>TRANS</span>
        <span>TRANS</span>
        <span style="background: #346d7e;">TRAN</span>
      </div>
    </div>

    <!-- TIKET BODY -->
    <div class="ticket-body">
      <div class="ticket-title">
        <h2><i class="fas fa-ticket-alt"></i> Tiket Bus</h2>
        <span class="sub"><i class="far fa-clock"></i> 20 Mei 2026</span>
      </div>

      <!-- grid data tiket -->
      <div class="grid-tiket">
        <div class="field">
          <label><i class="fas fa-user"></i> Penumpang</label>
          <div class="value"><i class="fas fa-user-circle"></i> Andi Pratama</div>
        </div>
        <div class="field">
          <label><i class="fas fa-map-pin"></i> Tujuan</label>
          <div class="value"><i class="fas fa-location-dot"></i> Yogyakarta</div>
        </div>
        <div class="field">
          <label><i class="fas fa-chair"></i> Kursi</label>
          <div class="value"><i class="fas fa-couch"></i> 7A (Eksekutif)</div>
        </div>
        <div class="field">
          <label><i class="fas fa-barcode"></i> Kode Booking</label>
          <div class="value"><i class="fas fa-qrcode"></i> #J993-27TR</div>
        </div>
      </div>

      <!-- ELEMEN dari j993.jpg : NON-EKONOMI · JURAGANG · JURAGAN99 · 7187UG -->
      <div class="juragan-strip">
        <span class="non-ekonomi"><i class="fas fa-crown"></i> NON-EKONOMI</span>
        <span><i class="fas fa-tag"></i> JURAGANG</span>
        <span class="jrg"><i class="fas fa-star"></i> JURAGAN99</span>
        <span style="font-family: 'Courier New', monospace; font-weight: 700; background: #dce8f0; padding: 2px 18px; border-radius: 40px;">7187UG</span>
      </div>

      <!-- ELEMEN dari 27trans.png : THOR · FREHR · STRANE · XXVII -->
      <div class="thor-frehr">
        <span class="code"><i class="fas fa-bolt"></i> THOR</span>
        <span class="code"><i class="fas fa-water"></i> FREHR</span>
        <span class="code"><i class="fas fa-route"></i> STRANE</span>
        <span class="xxvii"><i class="fas fa-roman-numeral"></i> XXVII</span>
      </div>

      <!-- tambahan trans line sesuai ut2.jpg -->
      <div class="extra-trans">
        <div class="trans-line">
          <i class="fas fa-arrow-right"></i> TRANS · TRANS · TRANS
        </div>
        <div class="trans-line" style="color: #1b4d5e;">
          <i class="fas fa-bus"></i> TRAN <span style="background: #d3e2ec; padding:0 10px; border-radius: 30px; margin-left: 6px;">#27</span>
        </div>
      </div>

      <!-- tombol booking -->
      <button class="btn-book" id="bookingBtn">
        <i class="fas fa-print"></i> CETAK TIKET
        <i class="fas fa-ticket"></i>
      </button>
    </div>
  </div>

  <script>
    (function() {
      const btn = document.getElementById('bookingBtn');
      if (btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          // efek interaksi 
          const original = this.innerHTML;
          this.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';
          this.style.background = '#dba532';
          this.style.boxShadow = '0 6px 0 #9e701f';
          setTimeout(() => {
            this.innerHTML = '<i class="fas fa-check-circle"></i> Tiket siap!';
            this.style.background = '#44b581';
            this.style.boxShadow = '0 6px 0 #2a7a59';
            setTimeout(() => {
              this.innerHTML = original;
              this.style.background = '#f4b942';
              this.style.boxShadow = '0 8px 0 #b87d2a, 0 6px 16px rgba(0,0,0,0.2)';
              alert('✨ Tiket Bus berhasil dipesan! (simulasi)');
            }, 1000);
          }, 1200);
        });
      }
    })();
  </script>
</body>
</html>
