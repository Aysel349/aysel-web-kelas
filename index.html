<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMG Trans</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
}

header{
    background:linear-gradient(90deg,#007BFF,#00BFFF);
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    font-size:35px;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    margin-bottom:25px;
}

h2{
    color:#007BFF;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.ticket{
    display:none;
    border:2px dashed #007BFF;
    padding:20px;
    border-radius:10px;
    background:#f8fbff;
}

.ticket h3{
    color:#007BFF;
    margin-bottom:15px;
}

.ticket p{
    margin:8px 0;
    font-size:16px;
}

.total{
    margin-top:15px;
    font-size:22px;
    color:green;
    font-weight:bold;
}

footer{
    background:#007BFF;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

@media(max-width:600px){

header h1{
font-size:28px;
}

}
</style>

</head>
<body>

<header>

<h1>🚌 Tiket Bus Online</h1>

<p>Pesan Tiket Bus Cepat, Mudah, dan Aman</p>

</header>

<div class="container">

<div class="card">

<h2>Form Pemesanan Tiket</h2>

<form id="bookingForm">

<label>Nama Penumpang</label>

<input type="text" id="nama" required>

<label>Kota Asal</label>

<select id="asal">
<option>Jakarta</option>
<option>Bandung</option>
<option>Yogyakarta</option>
<option>Surabaya</option>
<option>Semarang</option>
</select>

<label>Kota Tujuan</label>

<select id="tujuan">
<option>Bandung</option>
<option>Jakarta</option>
<option>Yogyakarta</option>
<option>Surabaya</option>
<option>Semarang</option>
</select>

<label>Tanggal Berangkat</label>

<input type="date" id="tanggal" required>

<label>Jam Keberangkatan</label>

<select id="jam">
<option>06:00 WIB</option>
<option>09:00 WIB</option>
<option>12:00 WIB</option>
<option>15:00 WIB</option>
<option>20:00 WIB</option>
</select>

<label>Jumlah Tiket</label>

<input type="number" id="jumlah" value="1" min="1">

<button type="submit">
Pesan Tiket
</button>

</form>

</div>

<div class="card ticket" id="ticket">

<h2>E-Ticket</h2>

<h3>Detail Pemesanan</h3>

<p><b>Nama :</b> <span id="outNama"></span></p>

<p><b>Asal :</b> <span id="outAsal"></span></p>

<p><b>Tujuan :</b> <span id="outTujuan"></span></p>

<p><b>Tanggal :</b> <span id="outTanggal"></span></p>

<p><b>Jam :</b> <span id="outJam"></span></p>

<p><b>Jumlah Tiket :</b> <span id="outJumlah"></span></p>

<p><b>Harga per Tiket :</b> Rp150.000</p>

<p class="total">
Total : <span id="outTotal"></span>
</p>

</div>

</div>

<footer>

© 2026 Tiket Bus Online | Dibuat dengan HTML, CSS & JavaScript

</footer>

<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault();

let nama=document.getElementById("nama").value;

let asal=document.getElementById("asal").value;

let tujuan=document.getElementById("tujuan").value;

let tanggal=document.getElementById("tanggal").value;

let jam=document.getElementById("jam").value;

let jumlah=parseInt(document.getElementById("jumlah").value);

if(asal==tujuan){

alert("Kota asal dan tujuan tidak boleh sama!");

return;

}

let harga=150000;

let total=harga*jumlah;

document.getElementById("ticket").style.display="block";

document.getElementById("outNama").innerHTML=nama;

document.getElementById("outAsal").innerHTML=asal;

document.getElementById("outTujuan").innerHTML=tujuan;

document.getElementById("outTanggal").innerHTML=tanggal;

document.getElementById("outJam").innerHTML=jam;

document.getElementById("outJumlah").innerHTML=jumlah;

document.getElementById("outTotal").innerHTML="Rp "+total.toLocaleString("id-ID");

window.scrollTo({

top:document.body.scrollHeight,

behavior:"smooth"

});

});

</script>

</body>
</html>
