<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMG Trans</title>
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            color: #fff;
        }

        .header h1 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }
        .header h1 i {
            color: #f1c40f;
            margin-right: 12px;
        }

        .header .tagline {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header .tagline i {
            margin-right: 8px;
            color: #2ecc71;
        }

        /* Grid utama */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 25px;
        }

        /* KARTU BUS */
        .bus-list {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px 18px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bus-list h2 {
            color: #fff;
            font-weight: 500;
            font-size: 1.5rem;
            margin-bottom: 18px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }
        .bus-list h2 i {
            color: #f39c12;
            margin-right: 10px;
        }

        .bus-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid #3498db;
            transition: 0.25s ease;
            cursor: pointer;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-left: 6px solid #3498db;
        }

        .bus-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .bus-item .bus-info {
            display: flex;
            flex-direction: column;
        }
        .bus-item .bus-name {
            font-weight: 600;
            font-size: 1.2rem;
        }
        .bus-item .bus-route {
            font-size: 0.9rem;
            color: #b0d4e8;
            margin-top: 4px;
        }
        .bus-item .bus-route i {
            margin: 0 6px;
            color: #f1c40f;
            font-size: 0.7rem;
        }

        .bus-item .bus-price {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }
        .bus-item .bus-price i {
            margin-right: 6px;
            color: #fff;
        }

        /* FORM PEMESANAN */
        .booking-form {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 22px 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .booking-form h2 {
            font-weight: 500;
            font-size: 1.5rem;
            margin-bottom: 18px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }
        .booking-form h2 i {
            color: #2ecc71;
            margin-right: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 400;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #d6eaf8;
        }
        .form-group label i {
            margin-right: 8px;
            width: 18px;
            color: #85c1e9;
        }

        .form-group input, 
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-group input:focus,
        .form-group select:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }
        .form-group input::placeholder {
            color: #a0bccf;
        }
        .form-group select option {
            background: #1e2f38;
            color: #fff;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #1e2a32;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 6px;
            box-shadow: 0 6px 18px rgba(241, 196, 15, 0.3);
            letter-spacing: 1px;
        }
        .btn-primary i {
            margin-right: 10px;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #f7dc6f, #f1c40f);
            box-shadow: 0 8px 25px rgba(241, 196, 15, 0.5);
        }

        /* RINGKASAN TIKET */
        .ticket-summary {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .ticket-summary h3 {
            font-weight: 400;
            font-size: 1.1rem;
            color: #b0d4e8;
            margin-bottom: 12px;
        }
        .ticket-summary h3 i {
            color: #f1c40f;
            margin-right: 8px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
            color: #ecf0f1;
            font-size: 0.95rem;
        }
        .summary-item:last-child {
            border-bottom: none;
        }
        .summary-item .label {
            color: #a0bccf;
        }
        .summary-item .value {
            font-weight: 500;
        }
        .summary-total {
            margin-top: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #f1c40f;
            display: flex;
            justify-content: space-between;
            border-top: 2px solid rgba(241, 196, 15, 0.2);
            padding-top: 14px;
        }

        .empty-ticket {
            color: #839baa;
            text-align: center;
            padding: 12px 0;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 820px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            .bus-item {
                flex-wrap: wrap;
            }
            .bus-item .bus-price {
                margin-top: 8px;
                width: 100%;
                text-align: center;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }

        /* notifikasi kecil */
        .toast-message {
            background: #2ecc71;
            color: #0f2027;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 12px;
            text-align: center;
            display: none;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .toast-message i {
            margin-right: 8px;
        }
        .toast-message.show {
            display: block;
        }

        /* Badge baru untuk bus baru */
        .badge-new {
            background: #e74c3c;
            color: white;
            font-size: 0.65rem;
            padding: 2px 10px;
            border-radius: 40px;
            margin-left: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- HEADER -->
    <div class="header">
        <h1><i class="fas fa-bus"></i> AMG Trans</h1>
        <div class="tagline"><i class="fas fa-check-circle"></i> Aman, Cepat, Terpercaya</div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
        <!-- DAFTAR BUS -->
        <div class="bus-list" id="busList">
            <h2><i class="fas fa-route"></i> Pilih Bus</h2>
            <!-- Bus items akan di-render oleh JavaScript -->
            <div id="busItemsContainer"></div>
        </div>

        <!-- FORM + RINGKASAN -->
        <div class="booking-form">
            <h2><i class="fas fa-ticket-alt"></i> Pesan Tiket</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="busSelect"><i class="fas fa-bus"></i> Bus</label>
                    <select id="busSelect" required>
                        <option value="">-- Pilih Bus --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="namaPenumpang"><i class="fas fa-user"></i> Nama Penumpang</label>
                    <input type="text" id="namaPenumpang" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tanggal"><i class="fas fa-calendar-day"></i> Tanggal</label>
                        <input type="date" id="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label for="jumlah"><i class="fas fa-users"></i> Jumlah</label>
                        <input type="number" id="jumlah" min="1" value="1" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="btnPesan"><i class="fas fa-check"></i> Pesan Tiket</button>
            </form>

            <!-- Ringkasan Tiket -->
            <div class="ticket-summary" id="ticketSummary">
                <h3><i class="fas fa-receipt"></i> Ringkasan Tiket</h3>
                <div id="summaryContent">
                    <div class="empty-ticket">Belum ada tiket dipesan</div>
                </div>
            </div>
            <!-- Toast notifikasi -->
            <div id="toast" class="toast-message"><i class="fas fa-check-circle"></i> <span id="toastText">Tiket berhasil dipesan!</span></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- DATA BUS (ditambah 3 bus baru Jakarta-Malang) -----
        const busData = [
            { id: 1, name: 'Sinar Jaya', route: 'Jakarta - Bandung', price: 120000 },
            { id: 2, name: 'PO Haryanto', route: 'Jakarta - Surabaya', price: 350000 },
            { id: 3, name: 'Kramat Djati', route: 'Jakarta - Yogyakarta', price: 270000 },
            { id: 4, name: 'Safari Dharma Raya', route: 'Bandung - Surabaya', price: 310000 },
            { id: 5, name: 'Bintang Mas', route: 'Jakarta - Semarang', price: 225000 },
            // BUS BARU: Jakarta - Malang
            { id: 6, name: 'PO U Trans', route: 'Jakarta - Malang', price: 420000 },
            { id: 7, name: 'Juragan 99', route: 'Jakarta - Malang', price: 450000 },
            { id: 8, name: '27 Trans', route: 'Jakarta - Malang', price: 395000 }
        ];

        // ----- ELEMEN DOM -----
        const busItemsContainer = document.getElementById('busItemsContainer');
        const busSelect = document.getElementById('busSelect');
        const namaPenumpang = document.getElementById('namaPenumpang');
        const tanggalInput = document.getElementById('tanggal');
        const jumlahInput = document.getElementById('jumlah');
        const bookingForm = document.getElementById('bookingForm');
        const summaryContent = document.getElementById('summaryContent');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');

        // ----- STATE: tiket terakhir -----
        let lastTicket = null; 

        // ----- RENDER DAFTAR BUS (card) -----
        function renderBusCards() {
            busItemsContainer.innerHTML = '';
            busData.forEach(bus => {
                const item = document.createElement('div');
                item.className = 'bus-item';
                item.dataset.id = bus.id;
                
                // Tambahkan badge "NEW" untuk 3 bus baru (id 6,7,8)
                let badgeHtml = '';
                if (bus.id >= 6 && bus.id <= 8) {
                    badgeHtml = `<span class="badge-new"><i class="fas fa-star"></i> NEW</span>`;
                }
                
                item.innerHTML = `
                    <div class="bus-info">
                        <span class="bus-name"><i class="fas fa-bus" style="margin-right: 8px; color:#f1c40f;"></i>${bus.name} ${badgeHtml}</span>
                        <span class="bus-route"><i class="fas fa-map-pin"></i> ${bus.route}</span>
                    </div>
                    <div class="bus-price"><i class="fas fa-tag"></i> Rp ${bus.price.toLocaleString('id-ID')}</div>
                `;
                // Klik card -> isi select & scroll ke form
                item.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const selectedBus = busData.find(b => b.id === id);
                    if (selectedBus) {
                        busSelect.value = selectedBus.id;
                        // highlight
                        document.querySelectorAll('.bus-item').forEach(el => el.style.borderLeftColor = '#3498db');
                        this.style.borderLeftColor = '#f1c40f';
                        // Scroll ke form (opsional)
                        document.querySelector('.booking-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
                busItemsContainer.appendChild(item);
            });
        }

        // ----- RENDER OPTION SELECT -----
        function renderSelectOptions() {
            busSelect.innerHTML = '<option value="">-- Pilih Bus --</option>';
            busData.forEach(bus => {
                const opt = document.createElement('option');
                opt.value = bus.id;
                opt.textContent = `${bus.name} - ${bus.route} (Rp ${bus.price.toLocaleString('id-ID')})`;
                busSelect.appendChild(opt);
            });
        }

        // ----- UPDATE RINGKASAN (berdasarkan tiket) -----
        function updateSummary(ticket) {
            if (!ticket) {
                summaryContent.innerHTML = `<div class="empty-ticket">Belum ada tiket dipesan</div>`;
                return;
            }
            // cari data bus
            const bus = busData.find(b => b.id === ticket.busId);
            if (!bus) {
                summaryContent.innerHTML = `<div class="empty-ticket">Data bus tidak ditemukan</div>`;
                return;
            }
            const total = bus.price * ticket.jumlah;
            const dateFormatted = ticket.tanggal ? new Date(ticket.tanggal).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : '-';

            summaryContent.innerHTML = `
                <div class="summary-item"><span class="label">Bus</span><span class="value">${bus.name}</span></div>
                <div class="summary-item"><span class="label">Rute</span><span class="value">${bus.route}</span></div>
                <div class="summary-item"><span class="label">Penumpang</span><span class="value">${ticket.nama}</span></div>
                <div class="summary-item"><span class="label">Tanggal</span><span class="value">${dateFormatted}</span></div>
                <div class="summary-item"><span class="label">Jumlah tiket</span><span class="value">${ticket.jumlah}</span></div>
                <div class="summary-item"><span class="label">Harga per tiket</span><span class="value">Rp ${bus.price.toLocaleString('id-ID')}</span></div>
                <div class="summary-total">
                    <span>Total</span>
                    <span>Rp ${total.toLocaleString('id-ID')}</span>
                </div>
            `;
        }

        // ----- FUNGSI PESAN TIKET -----
        function pesanTiket(e) {
            e.preventDefault();

            // Ambil nilai
            const busId = parseInt(busSelect.value);
            const nama = namaPenumpang.value.trim();
            const tanggal = tanggalInput.value;
            const jumlah = parseInt(jumlahInput.value) || 1;

            // Validasi
            if (!busId) {
                showToast('Pilih bus terlebih dahulu!', '#e67e22');
                return;
            }
            if (!nama) {
                showToast('Masukkan nama penumpang!', '#e67e22');
                return;
            }
            if (!tanggal) {
                showToast('Pilih tanggal keberangkatan!', '#e67e22');
                return;
            }
            if (jumlah < 1) {
                showToast('Jumlah tiket minimal 1', '#e67e22');
                return;
            }

            // Cek apakah bus ada
            const bus = busData.find(b => b.id === busId);
            if (!bus) {
                showToast('Bus tidak ditemukan', '#e67e22');
                return;
            }

            // Buat objek tiket
            const ticket = {
                busId: busId,
                nama: nama,
                tanggal: tanggal,
                jumlah: jumlah
            };

            // Simpan ke state
            lastTicket = ticket;
            // Update ringkasan
            updateSummary(ticket);
            // Tampilkan notifikasi sukses
            showToast(`Tiket untuk ${bus.name} berhasil dipesan!`, '#2ecc71');

            // Reset form (biarkan isian, tapi kita bisa optional)
            // namaPenumpang.value = '';
            // tanggalInput.value = '';
            // jumlahInput.value = 1;
            // busSelect.value = '';
        }

        // ----- TOAST NOTIFIKASI -----
        function showToast(message, bgColor = '#2ecc71') {
            toastText.textContent = message;
            toast.style.backgroundColor = bgColor;
            toast.style.display = 'block';
            // hilangkan setelah 3.5 detik
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        // ----- INISIALISASI TANGGAL (set today default) -----
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            tanggalInput.value = today;
        }

        // ----- EVENT LISTENER -----
        bookingForm.addEventListener('submit', pesanTiket);

        // ----- RENDER SEMUA -----
        function init() {
            renderBusCards();
            renderSelectOptions();
            setDefaultDate();
            // reset summary
            updateSummary(null);
            // set border default
            document.querySelectorAll('.bus-item').forEach(el => el.style.borderLeftColor = '#3498db');
        }

        init();

        // (Opsional) Jika select berubah, highlight card sesuai
        busSelect.addEventListener('change', function() {
            const val = parseInt(this.value);
            document.querySelectorAll('.bus-item').forEach(el => {
                const id = parseInt(el.dataset.id);
                if (id === val) {
                    el.style.borderLeftColor = '#f1c40f';
                } else {
                    el.style.borderLeftColor = '#3498db';
                }
            });
        });

    })();
</script>

</body>
</html>
